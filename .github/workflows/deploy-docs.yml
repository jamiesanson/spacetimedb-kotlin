name: "Deploy docs"

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "spacetimedb-bsatn/src/**"
      - "spacetimedb-core/src/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v4

      - name: "Generate API docs"
        run: ./gradlew :dokkaGenerate

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: "Install dependencies"
        working-directory: docs-site
        run: npm ci

      - name: "Build site"
        working-directory: docs-site
        run: npm run build

      - name: "Copy API docs into site"
        run: cp -r build/dokka/html docs-site/dist/api

      - name: "Upload Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    name: "Deploy"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
